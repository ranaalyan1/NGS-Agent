name: ngs-agent
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - mamba
  - bioconda::fastqc
  - bioconda::trimmomatic
  - bioconda::hisat2
  - bioconda::subread
  - bioconda::samtools
  - bioconda::multiqc
  - bioconda::bwa-mem2
  - bioconda::gatk4
  - bioconda::bcftools
  - bioconda::bedtools
  - bioconda::snpeff
  - r-base>=4.3
  - r-ggplot2
  - r-pheatmap
  - bioconda::bioconductor-deseq2
  - bioconda::bioconductor-clusterprofiler
  - bioconda::bioconductor-dose
  - bioconda::bioconductor-org.hs.eg.db
  - bioconda::bioconductor-org.mm.eg.db
  - bioconda::bioconductor-tximport
  - pip:
      - -e .
